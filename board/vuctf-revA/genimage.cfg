flash xt25f64 {
	pebsize = 65536
	numpebs = 128
	minimum-io-unit-size = 256
	sub-page-size = 256
	vid-header-offset = 64
}

image flash.bin {
	flash {}
	flashtype = xt25f64

	partition uboot {
		image = "u-boot-sunxi-with-spl.bin"
		size = 512K # 0x80000
	}

	partition dtb {
		image = "u-boot.dtb"
		size = 64k # 0x10000
	}

	partition zimage {
		image = "zImage" # 2 ** 20 * 3 + (8 * 2 ** 16)
		size = 3670016  #0x380000
	}

	partition rootfs {
		image = "rootfs.jffs2"
		size = 0 # the rest lol
	}
}
